name: Merge on CodeRabbit Approval

on:
  pull_request_review:
    types: [submitted]

jobs:
  merge-on-approval:
    runs-on: ubuntu-latest
    if: |
      (github.event.review.user.login == 'coderabbitai[bot]' ||
       github.event.review.user.login == 'github-actions[bot]') &&
      github.event.review.state == 'approved'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Merge PR
        run: gh pr merge --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
