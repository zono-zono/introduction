# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ja-JP"

tone_instructions: "レビューは日本語で、簡潔かつ建設的に行ってください。問題がない場合は簡潔に承認してください。"

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # 全ファイル共通のレビュー指示
  instructions: |
    このリポジトリは個人の自己紹介サイトです。

    ━━ 【最重要】個人情報・機密情報の漏洩チェック ━━
    以下が含まれている場合は必ず指摘してください：
    - 電話番号（携帯・固定電話）
    - プライベートなメールアドレス（公開していないもの）
    - 自宅住所（市区町村より詳細な情報）
    - 個人番号・マイナンバー
    - クレジットカード・銀行口座情報
    - パスワード・APIキー・アクセストークン・シークレット
    - 非公開にしたい個人的な情報（家族・交友関係など）

    ━━ コンテンツ品質 ━━
    - 日本語・英語の表現に不自然な点がないか
    - 誤字・脱字がないか
    - 事実として誤解を招く表現がないか

  # ファイル種別ごとのレビュー指示
  path_instructions:
    - path: "**/*.html"
      instructions: |
        - img要素にalt属性が適切に設定されているか（アクセシビリティ）
        - metaタグ・OGPタグ（og:title, og:description, og:image等）が整合しているか（SEO）
        - 外部リンクにrel="noopener noreferrer"が付いているか（セキュリティ）
        - ページ間リンクのhref先が存在するファイルか
        - Google Analytics等のトラッキングIDがハードコードされていないか確認（既存のG-RHRGX55H07は許容）

    - path: "**/*.css"
      instructions: |
        - 既存のデザインシステム（変数・命名規則）と一貫しているか
        - レスポンシブデザインへの考慮がされているか
        - 不要な重複スタイルや未使用のセレクタがないか

    - path: "**/*.{js,mjs}"
      instructions: |
        - APIキー・シークレットがハードコードされていないか（最重要）
        - 外部サービスへの通信が発生する場合、その必要性と安全性を確認

    - path: "wrangler.jsonc"
      instructions: |
        - シークレット・環境変数の値が直接記載されていないか
        - デプロイ設定に意図しない変更がないか

chat:
  auto_reply: true
